<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>学祭レジ 安定版</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f2f2f2;
}

.header {
  background: #111;
  color: #fff;
  padding: 10px;
  font-size: 14px;
}

.wrap { padding: 10px; }

.panel {
  background: #fff;
  padding: 6px;
  margin-bottom: 6px;
  border-radius: 10px;
}

.big {
  font-size: 28px;
  font-weight: bold;
}

.btn {
  border: none;
  border-radius: 10px;
  padding: 10px;
  font-size: 24px;
  color: white;
}

.blue { background: #1976d2; }
.red { background: #e53935; }

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

/* keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 10px;
  border-radius: 12px;
  background: #e0e0e0;
}

.keypad button {
  height: 52px;
  font-size: 22px;
  border: none;
  border-radius: 12px;
  background: #f5f5f5;
}

.key-c { background: #e53935; color:black; }
.key-back { background: #ff9800; color:black; }

.mode-indicator {
  font-size: 12px;
  opacity: 0.8;
}

/* ===== 口座入力オーバーレイ ===== */
#manualScreen {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  z-index:9999;
  padding:20px;
  box-sizing:border-box;
}

#manualBox {
  background:#fff;
  padding:15px;
  border-radius:12px;
}

#manualDisplay {
  font-size:32px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
営業日: <span id="day"></span> /
レジ: <span id="reg"></span><br>
件数: <span id="count">0</span> /
売上: ¥<span id="sales">0</span>
</div>

<div class="wrap">

<div class="panel">
点数: <span id="items">0</span>点<br>
小計: ¥<span id="sub">0</span><br>
<div class="big">合計: ¥<span id="total">0</span></div>
</div>

<div class="panel">
預かり: ¥<span id="rec">0</span><br>
おつり: ¥<span id="chg">0</span>
</div>



<div class="panel">
<div class="grid" id="priceButtons"></div>
</div>

<!-- 操作 -->
<div class="panel grid">
<button class="btn red" onclick="undo()">取消</button>
<button class="btn red" onclick="resetAll()">全取消</button>
<button class="btn blue" onclick="openManual()">口座入力</button>
</div>

<div class="panel">
<button class="btn blue" style="width:100%" onclick="pay()">
会計完了
</button>
</div>

<!-- テンキー -->
<div class="panel keypad" id="keypad">
<button onclick="num(7)">7</button>
<button onclick="num(8)">8</button>
<button onclick="num(9)">9</button>

<button onclick="num(4)">4</button>
<button onclick="num(5)">5</button>
<button onclick="num(6)">6</button>

<button onclick="num(1)">1</button>
<button onclick="num(2)">2</button>
<button onclick="num(3)">3</button>

<button class="key-c" onclick="clearRec()">C</button>
<button onclick="num(0)">0</button>
<button class="key-back" onclick="back()">←</button>
</div>

</div>

<!-- ===== 口座入力画面 ===== -->
<div id="manualScreen">
  <div id="manualBox">

    <div style="font-size:18px;margin-bottom:10px;">
      口座入力
    </div>

    <div id="manualDisplay">0</div>

    <div class="panel keypad" id="manualKeypad"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">
      <button class="btn blue" onclick="confirmManual()">確定</button>
      <button class="btn red" onclick="cancelManual()">キャンセル</button>
    </div>

  </div>
</div>

<script>

/* ===== state ===== */
let subtotal = 0;
let received = "";
let manualValue = "";
let history = [];
let isManualOpen = false;

/* ===== date ===== */
const today = new Date();

const day =
  today.getFullYear() + "-" +
  String(today.getMonth() + 1).padStart(2, "0") + "-" +
  String(today.getDate()).padStart(2, "0");

const reg = "A";

/* ===== storage ===== */
let logs = JSON.parse(localStorage.getItem("salesLogs") || "[]");

/* ===== init ===== */
document.getElementById("day").textContent = day;
document.getElementById("reg").textContent = reg;

/* ===== products ===== */
const prices = [700,600,500,400,380,300,280,250,240,200,180,130,100,];

const container = document.getElementById("priceButtons");

prices.forEach(p => {
  const b = document.createElement("button");
  b.className = "btn blue";
  b.textContent = p + "円";
  b.onclick = () => {
    subtotal += p;
    history.push(p);
    update();
  };
  container.appendChild(b);
});

/* ===== keypad ===== */
function num(n){
  if(isManualOpen) return;
  received += n;
  update();
}

function back(){
  if(isManualOpen) return;
  received = received.slice(0,-1);
  update();
}

/* ===== 口座入力 ===== */
function openManual(){
  manualValue = "";
  isManualOpen = true;
  document.getElementById("manualScreen").style.display = "block";
  updateManual();
}

function cancelManual(){
  manualValue = "";
  isManualOpen = false;
  document.getElementById("manualScreen").style.display = "none";
}

function confirmManual(){

  const price = Number(manualValue);

  if(!price || price <= 0){
    alert("金額が不正です");
    return;
  }

  subtotal += price;
  history.push(price);

  manualValue = "";
  isManualOpen = false;

  document.getElementById("manualScreen").style.display = "none";

  update();
  updateManual();
}
/* manual keypad */
function manualNum(n){
  manualValue = String(manualValue) + String(n);
  updateManual();
}

function manualBack(){
  manualValue = manualValue.slice(0,-1);
  updateManual();
}

function manualClear(){
  manualValue = "";
  updateManual();
}

/* keypad build */
const mk = document.getElementById("manualKeypad");

[7,8,9,4,5,6,1,2,3].forEach(n=>{
  const b = document.createElement("button");
  b.textContent = n;
  b.onclick = ()=>manualNum(n);
  mk.appendChild(b);
});
const cBtn = document.createElement("button");
cBtn.textContent = "C";
cBtn.className = "key-c";
cBtn.onclick = function () {
  manualClear();
};

const zeroBtn = document.createElement("button");
zeroBtn.textContent = "0";
zeroBtn.onclick = function () {
  manualNum(0);
};

const backBtn = document.createElement("button");
backBtn.textContent = "←";
backBtn.className = "key-back";
backBtn.onclick = function () {
  manualBack();
};

mk.appendChild(cBtn);
mk.appendChild(zeroBtn);
mk.appendChild(backBtn);


/* ===== update ===== */
function update(){

  const total = subtotal;
  const recv = Number(received) || 0;

  document.getElementById("items").textContent = history.length;
  document.getElementById("sub").textContent = subtotal;
  document.getElementById("total").textContent = total;
  document.getElementById("rec").textContent = received || 0;
  document.getElementById("chg").textContent = recv - total;

  

  document.getElementById("count").textContent = logs.length;
  document.getElementById("sales").textContent =
    logs.reduce((a,b)=>a+b.total,0);
}
function updateManual(){
  const el = document.getElementById("manualDisplay");
  if(!el) return;

  el.textContent = manualValue.length ? manualValue : "0";
}
/* ===== undo/reset ===== */
function undo(){
  if(history.length === 0) return;
  subtotal -= history.pop();
  update();
}

function resetAll(){
  if(!confirm("全取消しますか？")) return;
  subtotal = 0;
  received = "";
  manualValue = "";
  history = [];
  isManualOpen = false;
  update();
}

/* ===== pay ===== */
function pay(){

  if(subtotal === 0){
    alert("商品がありません");
    return;
  }

  const recv = Number(received) || 0;

  if(recv < subtotal){
    alert("金額不足です");
    return;
  }

  const change = recv - subtotal;

  if(!confirm(`合計 ¥${subtotal}\n預かり ¥${recv}\nおつり ¥${change}\n確定しますか？`)){
    return;
  }

  logs.push({
    day,
    reg,
    total: subtotal,
    received: recv,
    change
  });

  localStorage.setItem("salesLogs", JSON.stringify(logs));

  subtotal = 0;
  received = "";
  history = [];
  update();
}

/* ===== PWA ===== */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}

/* init */
update();

</script>

</body>
</html>
