<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>学祭レジ 完全版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f2f2;
}

.header{
  background:#111;
  color:#fff;
  padding:8px;
  font-size:12px;
}

.wrap{padding:6px;}

.panel{
  background:#fff;
  padding:6px;
  margin-bottom:6px;
  border-radius:10px;
}

.big{
  font-size:22px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}

.btn{
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:18px;
  color:#fff;
}

.blue{background:#1976d2;}
.red{background:#e53935;}

/* keypad */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}

.keypad button{
  height:48px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:#eee;
}

.key-c{background:#e53935;color:#000;}
.key-back{background:#ff9800;color:#000;}

/* overlay */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:9999;
  padding:10px;
  box-sizing:border-box;
}

#overlayBox{
  background:#fff;
  border-radius:12px;
  padding:10px;
}

#overlayDisplay{
  font-size:28px;
  font-weight:bold;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="header">
営業日: <span id="day"></span> /
件数: <span id="count">0</span> /
売上: ¥<span id="sales">0</span>
</div>

<div class="wrap">

<div class="panel">
点数: <span id="items">0</span><br>
小計: ¥<span id="sub">0</span><br>
<div class="big">合計: ¥<span id="total">0</span></div>
</div>

<div class="panel">
預かり: ¥<span id="recv">0</span><br>
おつり: ¥<span id="change">0</span>
</div>

<div class="panel grid" id="products"></div>

<div class="panel grid">
<button class="btn red" onclick="undo()">取消</button>
<button class="btn red" onclick="resetAll()">全取消</button>
<button class="btn blue" onclick="openOverlay()">口座入力</button>
</div>

<div class="panel">
<button class="btn blue" style="width:100%" onclick="pay()">会計完了</button>
</div>

<!-- テンキー -->
<div class="panel keypad">
<button onclick="num(7)">7</button>
<button onclick="num(8)">8</button>
<button onclick="num(9)">9</button>

<button onclick="num(4)">4</button>
<button onclick="num(5)">5</button>
<button onclick="num(6)">6</button>

<button onclick="num(1)">1</button>
<button onclick="num(2)">2</button>
<button onclick="num(3)">3</button>

<button class="key-c" onclick="clearRecv()">C</button>
<button onclick="num(0)">0</button>
<button class="key-back" onclick="back()">←</button>
</div>

</div>

<!-- ===== overlay ===== -->
<div id="overlay">
  <div id="overlayBox">

    <div>口座入力</div>

    <div id="overlayDisplay">0</div>

    <div class="panel keypad" id="overlayKeys"></div>

    <div class="grid" style="margin-top:10px;">
      <button class="btn blue" onclick="confirmOverlay()">確定</button>
      <button class="btn red" onclick="closeOverlay()">キャンセル</button>
    </div>

  </div>
</div>

<script>

/* ===== state ===== */
let subtotal = 0;
let recv = "";
let history = [];
let logs = [];

let overlayValue = "";
let overlayOpen = false;

/* ===== date ===== */
const d = new Date();
document.getElementById("day").textContent =
`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;

/* ===== products ===== */
const prices = [700,600,500,400,380,300,280,250,240,200,180,130,100];

const p = document.getElementById("products");

prices.forEach(v=>{
  const b = document.createElement("button");
  b.className="btn blue";
  b.textContent=v+"円";
  b.onclick=()=>{
    subtotal += v;
    history.push(v);
    update();
  };
  p.appendChild(b);
});

/* ===== normal keypad ===== */
function num(n){
  if(overlayOpen) return;
  recv += n;
  update();
}

function back(){
  if(overlayOpen) return;
  recv = recv.slice(0,-1);
  update();
}

function clearRecv(){
  recv = "";
  update();
}

/* ===== overlay ===== */
function openOverlay(){
  overlayOpen = true;
  overlayValue = "";

  document.getElementById("overlay").style.display="block";

  buildOverlay();
  updateOverlay();
}

function closeOverlay(){
  overlayOpen = false;
  document.getElementById("overlay").style.display="none";
}

function overlayNum(n){
  overlayValue += n;
  updateOverlay();
}

function overlayBack(){
  overlayValue = overlayValue.slice(0,-1);
  updateOverlay();
}

function overlayClear(){
  overlayValue = "";
  updateOverlay();
}

function confirmOverlay(){

  const v = Number(overlayValue);

  if(!v || v<=0){
    alert("金額エラー");
    return;
  }

  subtotal += v;
  history.push(v);

  closeOverlay();
  update();
}

function updateOverlay(){
  document.getElementById("overlayDisplay").textContent =
    overlayValue || "0";
}

function buildOverlay(){

  const k = document.getElementById("overlayKeys");
  k.innerHTML="";

  [7,8,9,4,5,6,1,2,3].forEach(n=>{
    const b=document.createElement("button");
    b.textContent=n;
    b.onclick=()=>overlayNum(n);
    k.appendChild(b);
  });

  const c=document.createElement("button");
  c.textContent="C";
  c.className="key-c";
  c.onclick=overlayClear;

  const z=document.createElement("button");
  z.textContent="0";
  z.onclick=()=>overlayNum(0);

  const b=document.createElement("button");
  b.textContent="←";
  b.className="key-back";
  b.onclick=overlayBack;

  k.appendChild(c);
  k.appendChild(z);
  k.appendChild(b);
}

/* ===== update ===== */
function update(){

  const r = Number(recv)||0;

  document.getElementById("sub").textContent=subtotal;
  document.getElementById("total").textContent=subtotal;
  document.getElementById("recv").textContent=recv||0;
  document.getElementById("change").textContent=r-subtotal;
  document.getElementById("items").textContent=history.length;

  document.getElementById("count").textContent=logs.length;
  document.getElementById("sales").textContent=
    logs.reduce((a,b)=>a+b.total,0);
}

/* ===== control ===== */
function undo(){
  if(history.length){
    subtotal -= history.pop();
    update();
  }
}

function resetAll(){

  if(subtotal === 0 && history.length === 0){
    alert("取り消す内容がありません");
    return;
  }

  if(!confirm(
`現在の会計をすべて取り消します。

小計　¥${subtotal}

本当に全取消しますか？`
  )){
    return;
  }

  subtotal = 0;
  recv = "";
  history = [];

  update();

  alert("全取消しました");
}
function pay(){

  const r = Number(recv) || 0;

  if(subtotal === 0){
    alert("商品がありません");
    return;
  }

  if(r < subtotal){
    alert("金額不足です");
    return;
  }

  const change = r - subtotal;

  if(!confirm(
`会計を確定しますか？

合計　　¥${subtotal}
預かり　¥${r}
おつり　¥${change}`
  )){
    return;
  }

  logs.push({
    total: subtotal,
    received: r,
    change: change,
    time: new Date().toLocaleString()
  });

  subtotal = 0;
  recv = "";
  history = [];

  update();

  alert("会計が完了しました");
}
update();
</script>

</body>
</html>
