<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>学祭レジ 安定版</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f2f2f2;
}

.header {
  background: #111;
  color: #fff;
  padding: 10px;
  font-size: 14px;
}

.wrap { padding: 10px; }

.panel {
  background: #fff;
  padding: 6px;
  margin-bottom: 6px;
  border-radius: 10px;
}

.big {
  font-size: 28px;
  font-weight: bold;
}

.btn {
  border: none;
  border-radius: 10px;
  padding: 10px;
  font-size: 24px;
  color: white;
}

.blue { background: #1976d2; }
.red { background: #e53935; }

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

/* ===== keypad ===== */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 10px;
  border-radius: 12px;
  transition: 0.2s;
}

/* 通常 */
.mode-recv {
  background: #e0e0e0;
}

/* 手入力モード（色分け） */
.mode-manual {
  background: #fff3e0;
  outline: 2px solid #ff9800;
}

.keypad button {
  height: 52px;
  font-size: 22px;
  border: none;
  border-radius: 12px;
  background: #f5f5f5;
}

.key-c { background: #e53935; color:black; }
.key-back { background: #ff9800; color:black; }

.mode-indicator {
  font-size: 12px;
  margin-top: 4px;
  opacity: 0.8;
}

@media (max-width: 480px) {
  .big { font-size: 22px; }
  .btn { padding: 8px; font-size: 15px; }
  .keypad { gap: 6px; }
  .keypad button { height: 46px; font-size: 20px; }
}
</style>
</head>

<body>

<div class="header">
営業日: <span id="day"></span> /
レジ: <span id="reg"></span><br>
件数: <span id="count">0</span> /
売上: ¥<span id="sales">0</span>
</div>

<div class="wrap">

<div class="panel">
点数: <span id="items">0</span>点<br>
小計: ¥<span id="sub">0</span><br>
<div class="big">合計: ¥<span id="total">0</span></div>
</div>

<div class="panel">
預かり: ¥<span id="rec">0</span><br>
おつり: ¥<span id="chg">0</span>
</div>

<!-- 手入力表示 -->
<div class="panel">
手入力: <span id="manualView">0</span>
<div class="mode-indicator" id="modeText">通常モード</div>
</div>

<div class="panel">
<div class="grid" id="priceButtons"></div>
</div>

<!-- 操作 -->
<div class="panel grid">
<button class="btn red" onclick="undo()">取消</button>
<button class="btn red" onclick="resetAll()">全取消</button>
<button class="btn blue" onclick="toggleManual()">手入力</button>
<button class="btn blue" onclick="clearManual()">クリア</button>
</div>

<div class="panel">
<button class="btn blue" style="width:100%" onclick="pay()">
会計完了
</button>
</div>

<!-- keypad -->
<div class="panel keypad" id="keypad">
<button onclick="num(7)">7</button>
<button onclick="num(8)">8</button>
<button onclick="num(9)">9</button>

<button onclick="num(4)">4</button>
<button onclick="num(5)">5</button>
<button onclick="num(6)">6</button>

<button onclick="num(1)">1</button>
<button onclick="num(2)">2</button>
<button onclick="num(3)">3</button>

<button class="key-c" onclick="clearRec()">C</button>
<button onclick="num(0)">0</button>
<button class="key-back" onclick="back()">←</button>
</div>

</div>

<script>
/* ===== state ===== */
let subtotal = 0;
let received = "";
let manualBuffer = "";
let history = [];
let inputMode = "recv";

/* ===== date ===== */
const today = new Date();

const day =
  today.getFullYear() + "-" +
  String(today.getMonth() + 1).padStart(2, "0") + "-" +
  String(today.getDate()).padStart(2, "0");

const reg = "A";

/* ===== storage ===== */
let logs = JSON.parse(localStorage.getItem("salesLogs") || "[]");

/* ===== init ===== */
document.getElementById("day").textContent = day;
document.getElementById("reg").textContent = reg;

/* ===== products ===== */
const prices = [700,600,500,400,380,300,280,250,240,200,180,130,100,50,10];
const container = document.getElementById("priceButtons");

prices.forEach(p => {
  const b = document.createElement("button");
  b.className = "btn blue";
  b.textContent = p + "円";
  b.onclick = () => {
    subtotal += p;
    history.push(p);
    update();
  };
  container.appendChild(b);
});

/* ===== mode ===== */
function toggleManual(){
  inputMode = "manual";
  manualBuffer = "";
  updateModeUI();
}

function clearManual(){
  manualBuffer = "";
  update();
}

/* ===== keypad ===== */
function num(n){
  if(inputMode === "recv"){
    received += n;
  } else {
    manualBuffer += n;
  }
  update();
}

function back(){
  if(inputMode === "recv"){
    received = received.slice(0,-1);
  } else {
    manualBuffer = manualBuffer.slice(0,-1);
  }
  update();
}

function clearRec(){
  received = "";
  update();
}

/* ===== add manual ===== */
function addManual(){
  const price = Number(manualBuffer);

  if(!price || price <= 0){
    alert("金額が不正です");
    return;
  }

  subtotal += price;
  history.push(price);

  manualBuffer = "";
  inputMode = "recv";

  update();
}

/* ===== update ===== */
function update(){
  const total = subtotal;
  const recv = Number(received) || 0;
  const change = recv - total;

  document.getElementById("items").textContent = history.length;
  document.getElementById("sub").textContent = subtotal;
  document.getElementById("total").textContent = total;
  document.getElementById("rec").textContent = received || 0;
  document.getElementById("chg").textContent = change;

  document.getElementById("manualView").textContent = manualBuffer || 0;

  updateModeUI();
}

/* ===== mode UI ===== */
function updateModeUI(){
  const pad = document.getElementById("keypad");
  const modeText = document.getElementById("modeText");

  if(inputMode === "manual"){
    pad.classList.add("mode-manual");
    pad.classList.remove("mode-recv");
    modeText.textContent = "手入力モード";
  } else {
    pad.classList.add("mode-recv");
    pad.classList.remove("mode-manual");
    modeText.textContent = "通常モード";
  }
}

/* ===== undo/reset ===== */
function undo(){
  if(history.length === 0) return;
  const last = history.pop();
  subtotal -= last;
  update();
}

function resetAll(){
  if(!confirm("全取消しますか？")) return;
  subtotal = 0;
  received = "";
  manualBuffer = "";
  history = [];
  update();
}

/* ===== pay ===== */
function pay(){
  if(subtotal === 0){
    alert("商品がありません");
    return;
  }

  const total = subtotal;
  const recv = Number(received) || 0;

  if(recv < total){
    alert("金額不足です");
    return;
  }

  const change = recv - total;

  if(!confirm(`合計 ¥${total}\n預かり ¥${recv}\nおつり ¥${change}\n確定しますか？`)){
    return;
  }

  logs.push({ day, reg, total, received: recv, change });

  localStorage.setItem("salesLogs", JSON.stringify(logs));

  subtotal = 0;
  received = "";
  manualBuffer = "";
  history = [];
  update();
}

/* ===== PWA ===== */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}

/* init */
update();
</script>

</body>
</html>
